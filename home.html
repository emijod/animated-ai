<!DOCTYPE html>
<html>
<head>
    <title>IMDb Movies - Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="ai_client.js"></script>
</head>
<body>

<header class="menu-bar">
    <div class="logo">
        <a href="home.html">IMDb<span>Movies</span></a>
    </div>

    <div class="menu-search">
        <input type="text" id="searchBox" placeholder="Search Movies..." oninput="showSuggestions()" onkeypress="handleEnter(event)">
        <select id="searchFilter" onchange="showSuggestions()">
            <option value="all">All</option>
            <option value="title">Title</option>
            <option value="year">Year</option>
            <option value="genres">Genre</option>
            <option value="directors">Director</option>
            <option value="writers">Writer</option>
        </select>
        <div id="suggestions"></div>
    </div>

    <nav class="menu-links">
        <a href="home.html">Home</a>
        <a href="index.html">Top Movies</a>
        <a href="category.html">Genre</a>
    </nav>
</header>

<div class="blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
</div>

<div class="container">
    <h1>Browse</h1>

    <div class="home-stats" id="homeStats">
        <div class="home-stat-card">
            <div class="home-stat-label">Total Movies</div>
            <div class="home-stat-value" id="statTotalMovies">0</div>
        </div>
        <div class="home-stat-card">
            <div class="home-stat-label">Total Genres</div>
            <div class="home-stat-value" id="statTotalGenres">0</div>
        </div>
        <div class="home-stat-card">
            <div class="home-stat-label">Start Year</div>
            <div class="home-stat-value" id="statStartYear">-</div>
        </div>
        <div class="home-stat-card">
            <div class="home-stat-label">Latest Year</div>
            <div class="home-stat-value" id="statLatestYear">-</div>
        </div>
    </div>

    <div id="previouslyViewedSection">
        <div class="section-header">Previously Viewed</div>
        <div id="homePreviouslyViewed" class="ai-row"></div>
    </div>

    <div class="section-header">Top 10 Movies</div>
    <div id="homeTop10" class="ai-row"></div>

    <div class="section-header">Recommended Movies</div>
    <div id="homeRecommendations" class="ai-row"></div>

    <div id="genre-sections"></div>
</div>

<div id="movieModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div class="poster-wrapper">
            <img id="modalPoster" src="posters/placeholder.svg" alt="Movie Poster" class="poster" onerror="this.onerror=null;this.src='posters/placeholder.svg';">
        </div>
        <div class="modal-details">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-year" id="modalYear"></div>
            <div class="modal-info" id="modalGenres"></div>
            <div class="modal-rating" id="modalRating"></div>
            <div class="modal-info" id="modalDirectors"></div>
            <div class="modal-info" id="modalWriters"></div>
            <div class="modal-info" id="modalRuntime"></div>
            <div class="modal-info" id="modalVotes"></div>
            <a href="#" class="modal-link" id="modalLink" target="_blank">View on IMDb</a>
        </div>
        <div id="modalRecommendations" class="ai-row"></div>
    </div>
</div>

<script>
let movies = [];
let indexedMovies = [];
let titleToEntry = new Map();
let genreToEntries = new Map();
const aiRecCache = new Map();

function normalizeData(data) {
    return Array.isArray(data) ? data : (data.movies || []);
}

function getPosterPath(movie) {
    const fallback = "posters/placeholder.svg";
    const raw = movie.poster || "";
    if (!raw) return fallback;

    const normalized = raw
        .replace(/_(19|20)\d{2}(?=\.[^.]+$)/, "")
        .replace(/_(?=\.[^.]+$)/, "");

    return `posters/${normalized}`;
}

async function fetchAIRecommendationTitles(title, k = 10) {
    const key = (title || "").toLowerCase();
    if (!key) return [];
    if (aiRecCache.has(key)) return aiRecCache.get(key);

    try {
        const res = await fetch(`/api/recommendations?title=${encodeURIComponent(title)}&k=${k}`);
        if (!res.ok) throw new Error("AI endpoint unavailable");
        const data = await res.json();
        const titles = (data.recommendations || []).map(r => r.title).filter(Boolean);
        aiRecCache.set(key, titles);
        return titles;
    } catch {
        return [];
    }
}

function titleMatchesQuery(title, query) {
    const q = (query || "").toLowerCase().trim();
    const t = (title || "").toLowerCase();
    if (!q) return false;

    if (q.length < 3) {
        if (t.startsWith(q)) return true;
        return t.split(/[^a-z0-9]+/).some(word => word.startsWith(q));
    }

    return t.includes(q);
}

function getSelectedFilter() {
    return (document.getElementById("searchFilter")?.value || "all").toLowerCase();
}

function getMovieFieldText(movie, field) {
    switch (field) {
        case "title": return (movie.title || "").toLowerCase();
        case "year": return String(movie.year || "");
        case "genres": return (movie.genres || "").toLowerCase();
        case "directors": return (movie.directors || "").toLowerCase();
        case "writers": return (movie.writers || "").toLowerCase();
        default:
            return [
                movie.title || "",
                String(movie.year || ""),
                movie.genres || "",
                movie.directors || "",
                movie.writers || "",
            ].join(" ").toLowerCase();
    }
}

function getRatingClass(value) {
    const n = Number(value);
    if (!Number.isFinite(n)) return "rating-mid";
    if (n >= 8) return "rating-high";
    if (n >= 6.5) return "rating-mid";
    return "rating-low";
}

function formatRuntime(minutes) {
    const n = Number(minutes);
    if (!Number.isFinite(n) || n <= 0) return "N/A";
    const h = Math.floor(n / 60);
    const m = Math.round(n % 60);
    if (h <= 0) return `${m}m`;
    if (m === 0) return `${h}h`;
    return `${h}h ${m}m`;
}

function enhanceHorizontalScrollers(selector) {
    document.querySelectorAll(selector).forEach(track => {
        if (track.dataset.scrollEnhanced === "1") return;

        const shell = document.createElement("div");
        shell.className = "scroll-shell";
        track.parentNode.insertBefore(shell, track);
        shell.appendChild(track);

        const left = document.createElement("button");
        left.className = "scroll-arrow scroll-arrow-left is-hidden";
        left.type = "button";
        left.textContent = "◀";

        const right = document.createElement("button");
        right.className = "scroll-arrow scroll-arrow-right is-hidden";
        right.type = "button";
        right.textContent = "▶";

        shell.appendChild(left);
        shell.appendChild(right);

        const update = () => {
            const canScroll = track.scrollWidth > track.clientWidth + 4;
            const atStart = track.scrollLeft <= 2;
            const atEnd = track.scrollLeft >= track.scrollWidth - track.clientWidth - 2;
            left.classList.toggle("is-hidden", !canScroll || atStart);
            right.classList.toggle("is-hidden", !canScroll || atEnd);
        };

        left.addEventListener("click", () => {
            track.scrollBy({ left: -Math.max(180, Math.floor(track.clientWidth * 0.75)), behavior: "smooth" });
        });
        right.addEventListener("click", () => {
            track.scrollBy({ left: Math.max(180, Math.floor(track.clientWidth * 0.75)), behavior: "smooth" });
        });

        track.addEventListener("scroll", update, { passive: true });
        window.addEventListener("resize", update);
        track.dataset.scrollEnhanced = "1";
        requestAnimationFrame(update);
    });
}

async function loadData() {
    try {
        const res = await fetch("movies.json");
        const data = await res.json();
        movies = normalizeData(data);
        preprocessData();
        renderHomeStats();
        renderHomeHighlights();
        requestAnimationFrame(renderGenres);
    } catch (e) {
        console.error("Error loading movies:", e);
        document.getElementById("genre-sections").innerHTML = "<p style='color:red;'>Failed to load movies</p>";
    }
}

function preprocessData() {
    indexedMovies = movies.map((movie, idx) => ({ movie, idx }));
    titleToEntry = new Map();
    genreToEntries = new Map();

    indexedMovies.forEach(entry => {
        const { movie } = entry;
        titleToEntry.set(movie.title, entry);

        (movie.genres || "").split(",").map(g => g.trim()).filter(Boolean).forEach(genre => {
            if (!genreToEntries.has(genre)) genreToEntries.set(genre, []);
            genreToEntries.get(genre).push(entry);
        });
    });
}

function renderHomeStats() {
    const totalMovies = movies.length;
    const genreSet = new Set();
    const years = [];

    movies.forEach(movie => {
        (movie.genres || "")
            .split(",")
            .map(g => g.trim())
            .filter(Boolean)
            .forEach(g => genreSet.add(g));

        const y = Number(movie.year);
        if (Number.isFinite(y) && y > 0) years.push(y);
    });

    const startYear = years.length ? Math.min(...years) : "-";
    const latestYear = years.length ? Math.max(...years) : "-";

    document.getElementById("statTotalMovies").textContent = totalMovies;
    document.getElementById("statTotalGenres").textContent = genreSet.size;
    document.getElementById("statStartYear").textContent = startYear;
    document.getElementById("statLatestYear").textContent = latestYear;
}

function renderMovieCard(movie, idx, rank = null) {
    const poster = getPosterPath(movie);
    const rankClass = rank && rank <= 3 ? `top-rank top-rank-${rank}` : "";
    const rankBadge = rank ? `<div class="rank-number ${rankClass}">${rank}</div>` : "";
    return `
        <div class="movie-card" onclick="showMovieDetails(${idx})">
            ${rankBadge}
            <div class="poster-wrapper">
                <img src="${poster}" alt="${movie.title}" class="poster" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='posters/placeholder.svg';">
                <div class="runtime-badge">${formatRuntime(movie.runtimeMinutes)}</div>
            </div>
            <div class="rank-info">
                <div class="rank-title">${movie.title} <span class="rank-year">(${movie.year || "N/A"})</span></div>
                <div class="rating ${getRatingClass(movie.rating)}">Rating: ${movie.rating || "N/A"}</div>
                <div class="votes">Votes: ${movie.numVotes || "N/A"}</div>
                <div class="genres">${movie.genres || ""}</div>
                <div class="directors">Director: ${movie.directors || "N/A"}</div>
                <div class="writers">Writer: ${movie.writers || "N/A"}</div>
            </div>
        </div>`;
}

function renderHomeHighlights() {
    const topDiv = document.getElementById("homeTop10");
    const recDiv = document.getElementById("homeRecommendations");
    const viewedSection = document.getElementById("previouslyViewedSection");
    const viewedDiv = document.getElementById("homePreviouslyViewed");
    topDiv.innerHTML = "";
    recDiv.innerHTML = "";
    viewedDiv.innerHTML = "";

    const ranked = [...indexedMovies].sort((a, b) => (b.movie.rating || 0) - (a.movie.rating || 0));
    const top10 = ranked.slice(0, 10);

    topDiv.innerHTML = top10.map((entry, i) => {
        return renderMovieCard(entry.movie, entry.idx, i + 1);
    }).join("");

    const recTitles = [];
    top10.forEach(entry => (entry.movie.recommendations || []).forEach(title => recTitles.push(title)));

    const seen = new Set();
    const recommendations = recTitles
        .map(title => titleToEntry.get(title))
        .filter(entry => entry && !seen.has(entry.movie.title) && seen.add(entry.movie.title))
        .sort((a, b) => (b.movie.rating || 0) - (a.movie.rating || 0))
        .slice(0, 10);

    if (window.AIClient && window.AIClient.getProfile) {
        const profile = window.AIClient.getProfile();
        recommendations.sort((a, b) => {
            const scoreA = (a.movie.rating || 0) + window.AIClient.personalizedBoost(a.movie, profile);
            const scoreB = (b.movie.rating || 0) + window.AIClient.personalizedBoost(b.movie, profile);
            return scoreB - scoreA;
        });
    }

    recDiv.innerHTML = recommendations.map(entry => {
        return renderMovieCard(entry.movie, entry.idx);
    }).join("");

    if (window.AIClient && window.AIClient.getProfile) {
        const profile = window.AIClient.getProfile();
        const viewedEntries = (profile.recent || [])
            .map(title => titleToEntry.get(title))
            .filter(Boolean)
            .slice(0, 12);

        if (viewedEntries.length) {
            viewedSection.style.display = "block";
            viewedDiv.innerHTML = viewedEntries.map(entry => renderMovieCard(entry.movie, entry.idx)).join("");
        } else {
            viewedSection.style.display = "none";
        }
    } else {
        viewedSection.style.display = "none";
    }

    enhanceHorizontalScrollers("#homeTop10");
    enhanceHorizontalScrollers("#homeRecommendations");
    enhanceHorizontalScrollers("#homePreviouslyViewed");
}

function renderGenres() {
    const container = document.getElementById("genre-sections");
    container.innerHTML = "";

    Array.from(genreToEntries.keys()).forEach(genre => {
        const section = document.createElement("div");
        section.className = "genre-section";

        const title = document.createElement("h2");
        title.textContent = genre;
        section.appendChild(title);

        const row = document.createElement("div");
        row.className = "genre-row";

        const entries = genreToEntries.get(genre) || [];
        row.innerHTML = entries.map(entry => renderMovieCard(entry.movie, entry.idx)).join("");

        section.appendChild(row);
        container.appendChild(section);
    });

    enhanceHorizontalScrollers(".genre-row");
}

async function showMovieDetails(idx) {
    const m = movies[idx];
    if (!m) return;

    document.getElementById("modalPoster").src = getPosterPath(m);
    document.getElementById("modalTitle").textContent = m.title || "N/A";
    document.getElementById("modalYear").textContent = `Year: ${m.year || "N/A"}`;
    document.getElementById("modalGenres").textContent = `Genres: ${m.genres || "N/A"}`;
    const modalRating = document.getElementById("modalRating");
    modalRating.className = `modal-rating ${getRatingClass(m.rating)}`;
    modalRating.textContent = `Rating: ${m.rating || "N/A"}`;
    document.getElementById("modalDirectors").textContent = `Director: ${m.directors || "N/A"}`;
    document.getElementById("modalWriters").textContent = `Writer: ${m.writers || "N/A"}`;
    document.getElementById("modalRuntime").textContent = `Runtime: ${formatRuntime(m.runtimeMinutes)}`;
    document.getElementById("modalVotes").textContent = `Votes: ${m.numVotes || "N/A"}`;
    document.getElementById("modalLink").href = `https://www.imdb.com/find/?q=${encodeURIComponent(m.title || "")}`;
    if (window.AIClient) window.AIClient.recordMovieView(m);

    const recDiv = document.getElementById("modalRecommendations");
    recDiv.innerHTML = "";
    const aiTitles = await fetchAIRecommendationTitles(m.title, 10);
    const recTitles = aiTitles.length ? aiTitles : (m.recommendations || []);
    recTitles.forEach(title => {
        const recEntry = titleToEntry.get(title) || movies.findIndex(movie => movie.title === title);
        const resolved = typeof recEntry === "number" ? (recEntry >= 0 ? { idx: recEntry, movie: movies[recEntry] } : null) : recEntry;
        if (resolved) {
            const recMovie = resolved.movie;
            const recPoster = getPosterPath(recMovie);
            recDiv.innerHTML += `
                <div class="recommendation-card" onclick="showMovieDetails(${resolved.idx})">
                    <img src="${recPoster}" alt="${recMovie.title}" class="recommendation-poster" onerror="this.onerror=null;this.src='posters/placeholder.svg';">
                    <div class="recommendation-title">${recMovie.title}</div>
                </div>`;
        }
    });

    enhanceHorizontalScrollers("#modalRecommendations");
    document.getElementById("movieModal").classList.add("show");
}

function closeModal(e) {
    if (e && e.target !== document.getElementById("movieModal")) return;
    document.getElementById("movieModal").classList.remove("show");
}

async function showSuggestions() {
    const input = document.getElementById("searchBox").value.toLowerCase().trim();
    const field = getSelectedFilter();
    const suggestionsDiv = document.getElementById("suggestions");
    if (!input || movies.length === 0) {
        suggestionsDiv.style.display = "none";
        return;
    }

    const matches = (window.AIClient && (field === "all" || field === "title"))
        ? await window.AIClient.getAISuggestions(movies, input, 10)
        : movies
            .map(m => {
                const text = getMovieFieldText(m, field);
                let score = 0;
                if (text.startsWith(input)) score = 1200;
                else if (text.split(/[^a-z0-9]+/).some(word => word.startsWith(input))) score = 900;
                else if (input.length >= 3 && text.includes(input)) score = 500;
                return { movie: m, score };
            })
            .filter(x => x.score > 0)
            .sort((a, b) => b.score - a.score || (b.movie.rating || 0) - (a.movie.rating || 0))
            .slice(0, 10)
            .map(x => x.movie);
    suggestionsDiv.innerHTML = matches
        .map(m => `<div class="suggestion-item" onclick="selectSuggestion('${(m.title || "").replace(/'/g, "\\'")}')">${m.title} (${m.year || "N/A"})</div>`)
        .join("");
    suggestionsDiv.style.display = "block";
}

function selectSuggestion(title) {
    document.getElementById("searchFilter").value = "title";
    document.getElementById("searchBox").value = title;
    hideSuggestions();
    if (window.AIClient) window.AIClient.recordSearch(title);
    const field = "title";
    window.location.href = `results.html?movie=${encodeURIComponent(title)}&field=${encodeURIComponent(field)}`;
}

function hideSuggestions() {
    document.getElementById("suggestions").style.display = "none";
}

function handleEnter(e) {
    if (e.key === "Enter") {
        const query = document.getElementById("searchBox").value.trim();
        hideSuggestions();
        if (!query) {
            window.location.href = "home.html";
            return;
        }
        if (window.AIClient) window.AIClient.recordSearch(query);
        const field = getSelectedFilter();
        window.location.href = `results.html?movie=${encodeURIComponent(query)}&field=${encodeURIComponent(field)}`;
    }
}

document.addEventListener("click", e => {
    const sb = document.getElementById("searchBox");
    if (e.target !== sb && !sb.contains(e.target)) hideSuggestions();
});

loadData();
</script>
</body>
</html>
